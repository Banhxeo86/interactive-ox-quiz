<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OX Quiz - Teacher</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="teacher-body">
    <div class="teacher-shell">
      <header class="admin-panel">
        <h1 class="brand-title">OX Live Studio</h1>
        <div class="room-controls">
          <button id="createRoomBtn">새 방 만들기</button>
          <button id="openGuideBtn" class="sub-btn">설명서</button>
          <span id="teacherRoomCode" class="room-code">방 코드: -</span>
        </div>
        <div class="question-controls">
          <input id="questionInput" type="text" placeholder="현재 문제를 입력하세요" disabled />
          <button id="updateQuestionBtn" disabled>문제 적용</button>
        </div>
        <div class="session-controls">
          <button id="startQuizBtn" class="session-btn start" disabled>시작</button>
          <button id="stopQuizBtn" class="session-btn stop" disabled>마감</button>
          <span id="sessionStatus" class="session-status">대기 중</span>
        </div>
        <p id="currentQuestion" class="current-question"></p>
        <div class="scoreboard">
          <div class="score o">O: <span id="countO">0</span></div>
          <div class="score x">X: <span id="countX">0</span></div>
        </div>
      </header>

      <main class="canvas-wrap">
        <div class="zone zone-o"><span>O</span></div>
        <div class="zone zone-x"><span>X</span></div>
        <div id="animLayer" class="anim-layer"></div>
      </main>
      <footer class="teacher-footer">© AI-ON 교과연구회</footer>
    </div>

    <div id="guideModal" class="guide-modal hidden">
      <div class="guide-card">
        <h2>수업 진행 가이드</h2>
        <ol>
          <li>새 방 만들기를 눌러 숫자 6자리 방 코드를 생성합니다.</li>
          <li>학생에게 `/student` 주소와 방 코드를 안내합니다.</li>
          <li>문제를 입력하고 `문제 적용`을 누릅니다.</li>
          <li>`시작`을 누르면 학생 응답이 반영됩니다.</li>
          <li>`마감`을 누르면 응답이 잠기고 집계는 유지됩니다.</li>
        </ol>
        <button id="closeGuideBtn" class="sub-btn">닫기</button>
      </div>
    </div>

    <script type="module" src="/teacher.js"></script>
  </body>
</html>
